<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>陶猪数字大赏 - 高定工坊版</title>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; user-select: none; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Microsoft YaHei", sans-serif; }
        :root { --gold: #E5C158; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        

        #uiLayer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; display: none; pointer-events: none; }
        .hud-container { display: flex; justify-content: space-between; padding: 20px 30px; transition: all 0.3s; }
        .hud-left { display: flex; flex-direction: column; gap: 10px; }
        
        .hud-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 20px; color: #fff; font-weight: 300; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); pointer-events: auto; letter-spacing: 1px; }
        
        #scoreBoard { font-size: 16px; color: #fff; }
        #scoreBoard span { color: var(--gold); font-weight: 600; font-size: 20px; margin-left: 10px; }
        #livesBoard { font-size: 16px; color: #ccc; }
        
        .era-box { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .era-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        #eraBoard { font-size: 20px; color: var(--gold); letter-spacing: 4px; font-weight: 300; }

        #legendBoard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--glass); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: #aaa; pointer-events: auto; font-size: 11px; font-weight: 300; letter-spacing: 1px; display: none; gap: 15px; } 
        .legend-item { display: flex; align-items: center; }

        #levelUpText { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 50px; color: #fff; font-weight: 100; letter-spacing: 20px; text-shadow: 0 0 30px var(--gold); opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; z-index: 15; }

        /* ==================== 摇杆与加速 UI ==================== */
        #boostArea { position: absolute; bottom: 8%; left: 5%; width: 100px; display: none; flex-direction: column; align-items: center; gap: 12px; pointer-events: auto; z-index: 50;}
        .stamina-container { width: 80px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #staminaBar { width: 100%; height: 100%; background: linear-gradient(90deg, #00E5FF, #00B8D4); transition: width 0.1s; }
        #btnBoost { width: 70px; height: 70px; border-radius: 50%; background: var(--glass); border: 2px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; letter-spacing: 2px; backdrop-filter: blur(10px); transition: 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; }
        #btnBoost.active { background: rgba(0, 229, 255, 0.3); border-color: #00E5FF; transform: scale(0.9); box-shadow: 0 0 20px rgba(0,229,255,0.5); }

        #joystickZone { position: absolute; bottom: 5%; right: 5%; width: 150px; height: 150px; pointer-events: auto; display: none; z-index: 50;}

        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: white; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .screen h1 { font-size: 40px; margin-bottom: 10px; letter-spacing: 15px; color: #fff; font-weight: 300; text-indent: 15px; text-align: center; }
        .screen p.subtitle { font-size: 12px; color: var(--gold); margin-bottom: 40px; letter-spacing: 6px; font-weight: 300; text-align: center; }
        
        .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; font-size: 14px; color: #fff; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; cursor: pointer; transition: all 0.4s ease; letter-spacing: 3px; font-weight: 300; backdrop-filter: blur(10px); }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 10px 30px rgba(255,255,255,0.2); transform: translateY(-2px); }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-gold:hover { background: var(--gold); color: #000; box-shadow: 0 10px 30px rgba(229,193,88,0.3); }
        
        #gameOverScreen { display: none; }
        #finalScore { font-size: 20px; color: #888; margin-bottom: 10px; letter-spacing: 4px; font-weight: 300; }
        #finalRankTitle { font-size: 40px; color: var(--gold); margin: 0 0 50px 0; letter-spacing: 10px; font-weight: 300; }

        #galleryScreen { display: none; background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; z-index: 30; pointer-events: none; }
        #galleryInfo, .close-gallery, .arrow-btn { pointer-events: auto; }
        #galleryInfo { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: white; width: 80%; max-width: 500px; background: var(--glass); padding: 20px 30px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        #galleryInfo h2 { font-size: 20px; margin: 0 0 10px 0; color: #fff; letter-spacing: 6px; font-weight: 300; }
        #galleryInfo p { font-size: 12px; color: #aaa; line-height: 1.6; margin: 0; font-weight: 300; letter-spacing: 1px; }
        #galleryControls { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 5%; box-sizing: border-box; transform: translateY(-50%); }
        .arrow-btn { font-size: 24px; color: #fff; background: var(--glass); border: 1px solid var(--glass-border); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; backdrop-filter: blur(10px); }
        .arrow-btn:hover { background: #fff; color: #000; transform: scale(1.05); }
        .close-gallery { position: absolute; top: 20px; right: 20px; font-size: 13px; }

        /* 海报层 */
        #posterContainer { position: fixed; left: -9999px; top: 0; width: 720px; height: 1280px; background: #050505; color: #fff; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; padding: 80px 40px; z-index: -100; font-family: "Microsoft YaHei", sans-serif; overflow: hidden;}
        .poster-bg-glow { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(229,193,88,0.15) 0%, rgba(0,0,0,0) 70%); z-index: 1; }
        .poster-header { z-index: 2; text-align: center; margin-bottom: 40px; }
        .poster-title { font-size: 55px; font-weight: 100; letter-spacing: 15px; margin: 0; text-indent: 15px; color: #fff; }
        .poster-sub { font-size: 18px; color: var(--gold); letter-spacing: 8px; margin-top: 15px; font-weight: 300; }
        #posterModelImg { z-index: 2; width: 600px; height: 600px; object-fit: cover; border-radius: 50%; mask-image: radial-gradient(circle, black 60%, transparent 100%); -webkit-mask-image: radial-gradient(circle, black 60%, transparent 100%); margin-bottom: 30px; }
        .poster-rank-box { z-index: 2; border-top: 1px solid rgba(255,255,255,0.2); border-bottom: 1px solid rgba(255,255,255,0.2); padding: 30px 0; text-align: center; width: 80%; margin-bottom: auto;}
        .poster-score { font-size: 26px; color: #aaa; letter-spacing: 6px; font-weight: 300; margin-bottom: 15px; }
        .poster-rank { font-size: 48px; color: var(--gold); letter-spacing: 12px; font-weight: 300; }
        .poster-footer { z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; font-size: 16px; color: #666; font-weight: 300; letter-spacing: 2px; }
        .poster-qr { width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 8px; }

        #posterOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        #finalPosterImg { height: 75vh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .poster-tip { color: #fff; font-size: 16px; margin-top: 25px; letter-spacing: 3px; font-weight: 300; background: rgba(255,255,255,0.1); padding: 12px 30px; border-radius: 30px; }
        .poster-close { position: absolute; top: 20px; right: 20px; font-size: 40px; color: #fff; cursor: pointer; background: none; border: none; opacity: 0.5; transition: 0.3s; }
        .poster-close:hover { opacity: 1; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
</head>
<body>
    <div id="posterContainer">
        <div class="poster-bg-glow"></div>
        <div class="poster-header">
            <h1 class="poster-title">陶猪数字大赏</h1>
            <div class="poster-sub">西辽河流域文明 · 跨时空进化</div>
        </div>
        <img id="posterModelImg" src="" alt="">
        <div class="poster-rank-box">
            <div class="poster-score" id="posterScoreTxt">最终探索得分：0</div>
            <div class="poster-rank" id="posterRankTxt">文物发现者</div>
        </div>
        <div class="poster-footer">
            <div style="line-height: 1.8;">
                <div style="color: #fff;">长按保存图片发朋友圈</div>
                <div style="font-size: 12px; margin-top: 5px;">Director / Producer: 许文杰</div>
            </div>
            <div class="poster-qr" style="background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; color: #000; font-size: 10px; text-align: center;">扫描二维码<br>开启进化</div>
        </div>
    </div>

    <div id="posterOverlay">
        <button class="poster-close" onclick="document.getElementById('posterOverlay').style.display='none'">×</button>
        <img id="finalPosterImg" src="" alt="您的专属战报">
        <div class="poster-tip">📸 已为您捕捉绝美角度，长按图片即可保存分享</div>
    </div>

    <div id="uiLayer">
        <div class="hud-container">
            <div class="hud-left">
                <div id="scoreBoard" class="hud-box">SCORE <span>0</span></div>
                <div id="livesBoard" class="hud-box" style="padding-top:10px; padding-bottom:10px;">❤️❤️❤️</div>
            </div>
            <div class="hud-right">
                <div class="hud-box era-box">
                    <span class="era-label">Evolution Phase</span>
                    <span id="eraBoard">远古泥胚</span>
                </div>
            </div>
        </div>
        
        <div id="legendBoard">
            <div class="legend-item">🍎(+1)</div>
            <div class="legend-item" style="color:var(--gold);">🍑(+3)</div>
            <div class="legend-item" style="color:#00E5FF;">💊(+1命)</div>
            <div class="legend-item" style="color:#666;">💣(扣除)</div>
        </div>
        
        <div id="boostArea">
            <div class="stamina-container"><div id="staminaBar"></div></div>
            <div id="btnBoost">加速</div>
        </div>
        <div id="joystickZone"></div>
    </div>

    <div id="levelUpText">形态跃迁</div>

    <div id="startScreen" class="screen">
        <h1>陶猪数字大赏</h1>
        <p class="subtitle">西辽河流域文明 · 跨时空进化全息推演</p>
        <div class="btn-group">
            <button class="btn btn-gold" onclick="startGame()">启动推演序列</button>
            <button class="btn" onclick="openGallery()">进入数字展厅</button>
        </div>
    </div>

    <div id="gameOverScreen" class="screen">
        <h1 style="font-size: 40px; margin-bottom: 20px;">推演终止</h1>
        <p id="finalScore">探索得分：0</p>
        <div id="finalRankTitle">文物发现者</div> 
        <div class="btn-group">
            <button class="btn btn-gold" onclick="generatePoster()">📸 生成战报海报</button>
            <button class="btn" onclick="resetGame()">重新推演</button>
            <button class="btn" onclick="openGallery()">进入展厅</button>
        </div>
    </div>

    <div id="galleryScreen" class="screen">
        <button class="btn close-gallery" onclick="closeGallery()">关闭展厅</button>
        <div id="galleryControls">
            <button class="arrow-btn" onclick="changeGallery(-1)">‹</button>
            <button class="arrow-btn" onclick="changeGallery(1)">›</button>
        </div>
        <div id="galleryInfo">
            <h2 id="galleryTitle">远古泥胚</h2>
            <p id="galleryDesc">载入中...</p>
        </div>
    </div>

    <script>
        // 音效系统
        const bgMusic = new Audio('bgm.mp3'); bgMusic.loop = true; bgMusic.volume = 0.3;
        function playBGM() { bgMusic.play().catch(e => {}); }
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume(); const now = audioCtx.currentTime;
            if (type === 'evolve') { [0, 4, 7, 12].forEach((s, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle'; osc.frequency.value = 220 * Math.pow(2, s/12); gain.gain.setValueAtTime(0.2, now + i*0.1); gain.gain.linearRampToValueAtTime(0, now + 1.5 + i*0.1); osc.start(now + i*0.1); osc.stop(now + 1.5 + i*0.1); }); return; }
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'apple') { osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now+0.1); } else if (type === 'gold') { osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now+0.2); } else if (type === 'heart') { osc.type='triangle'; osc.frequency.setValueAtTime(400, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now+0.2); } else if (type === 'bomb') { osc.type='square'; osc.frequency.setValueAtTime(100, now); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now+0.3); }
        }

        let gameState = 'start'; let score = 0; let lives = 3; let currentLevel = 1; let finalRankName = "";
        function calculateRank(s) { if (s < 10) return "初级勘探员"; if (s < 25) return "金缮修复师"; if (s < 45) return "盛世见证者"; return "赛博纪元领航员"; }

        // ==========================================
        // 渲染器与场景初始化
        // ==========================================
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true }); 
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0; 
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000); 
        // 【修改：将镜头拉近了，高度从 8 降到 5，远近距离从 15 拉近到 9】
        function adjustCameraForMobile() { 
            camera.position.set(0, 5, 9); 
            camera.lookAt(0, -2, 0); 
        }
        adjustCameraForMobile();

        const scene = new THREE.Scene(); 
        
        // 贴入天空背景
        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('sky_bg.png', function(texture) {
            texture.colorSpace = THREE.SRGBColorSpace;
            scene.background = texture;
            // scene.environment = texture; // 需要天空反光可取消注释
        }, undefined, function(err) {
            console.warn("未找到 sky_bg.png，使用黑底。");
            scene.background = new THREE.Color(0x050505);
        });

        // 光影
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffffff, 2.5); 
        spotLight.position.set(0, 15, 5); spotLight.angle = Math.PI / 4; spotLight.penumbra = 0.8; spotLight.castShadow = true; 
        spotLight.shadow.mapSize.width = 2048; spotLight.shadow.mapSize.height = 2048; 
        scene.add(spotLight);
        const pigLight = new THREE.PointLight(0xffffff, 0.8, 10); scene.add(pigLight);

        // 加载器
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.3/');
        loader.setDRACOLoader(dracoLoader);

        // 加载大平层展台
        loader.load('stage.glb', function(gltf) {
            let stage = gltf.scene;
            stage.traverse(function(child) {
                if (child.isMesh) { child.receiveShadow = true; child.castShadow = true; }
            });
            stage.scale.set(10, 10, 10); 
            stage.position.set(0, -3.4, 0); 
            scene.add(stage);
        }, undefined, function(error) {
            console.warn("未检测到 stage.glb", error);
        });

        let pigModels = [null, null, null, null]; let activePig = null; let itemModels = { apple: null, gold: null, heart: null, bomb: null }; let pigScales = [2.5, 2.5, 2.5, 2.5]; 
        
        // 去掉了发光材质外壳，保留原生烘焙材质
        function setupModel(m) { 
            m.traverse(c => { 
                if (c.isMesh) { 
                    c.castShadow = true; 
                    c.receiveShadow = true; 
                } 
            }); 
        }
        
        loader.load('pig1.glb', g => { pigModels[0]=g.scene; setupModel(g.scene); activePig=g.scene; activePig.position.y=-2; activePig.scale.set(pigScales[0],pigScales[0],pigScales[0]); scene.add(activePig); }, undefined, e => console.error("加载pig1失败", e));
        loader.load('pig2.glb', g => { pigModels[1]=g.scene; setupModel(g.scene); }); loader.load('pig3.glb', g => { pigModels[2]=g.scene; setupModel(g.scene); }); loader.load('pig4.glb', g => { pigModels[3]=g.scene; setupModel(g.scene); });
        loader.load('apple.glb', g => { itemModels.apple=g.scene; setupModel(g.scene); }); loader.load('peach.glb', g => { itemModels.gold=g.scene; setupModel(g.scene); }); loader.load('pill.glb', g => { itemModels.heart=g.scene; setupModel(g.scene); }); loader.load('bomb.glb', g => { itemModels.bomb=g.scene; setupModel(g.scene); });

        let activeItems = []; let explosionParticles = []; let auraParticles = [];
        function createExplosion(x, y, z, color) { for(let i=0; i<15; i++) { let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: color })); p.position.set(x, y, z); p.life = 1.0; p.velocity = new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.5, (Math.random()-0.5)*0.5); scene.add(p); explosionParticles.push(p); } }

        function spawnItem(baseSpeed) {
            let rand = Math.random(); let type = 'apple'; let color = 0xe74c3c;
            if (rand > 0.7 && rand < 0.85) { type='gold'; color=0xE5C158; } else if (rand > 0.85 && rand < 0.93) { type='heart'; color=0x00E5FF; } else if (rand > 0.93) { type='bomb'; color=0x333333; }
            if (!itemModels[type]) return; let mesh = itemModels[type].clone();
            mesh.traverse(c => { if(c.isMesh) { c.material = c.material.clone(); if(type==='gold') { c.material.emissive=new THREE.Color(0xE5C158); c.material.emissiveIntensity=0.3; } if(type==='heart') { c.material.emissive=new THREE.Color(0x00E5FF); c.material.emissiveIntensity=0.3; } } });
            
            // 1. 单独调整道具大小
            let s = 1;
            if (type === 'apple') s = 0.04;        
            else if (type === 'gold') s = 0.1;    
            else if (type === 'heart') s = 0.5;   
            else if (type === 'bomb') s = 0.5;    
            mesh.scale.set(s, s, s); 
            
            // 2. 掉落范围
            mesh.position.set((Math.random()-0.5)*15, 15, (Math.random()-0.5)*15); 
            scene.add(mesh);
            
            // 3. 修复光圈
            let ringColor = (type === 'bomb') ? 0xaaaaaa : color; 
            let ring = new THREE.Mesh(new THREE.RingGeometry(1.5, 1.8, 32), new THREE.MeshBasicMaterial({ color: ringColor, transparent: true, opacity: 0.5, side: THREE.DoubleSide })); 
            ring.rotation.x = -Math.PI / 2; 
            ring.position.y = -3.39; 
            scene.add(ring);
            
            activeItems.push({ mesh, ring, type, color, speed: baseSpeed + Math.random() * 0.02 });
        }

        function evolvePig(idx, name) {
            if (!pigModels[idx] || currentLevel === idx+1) return; playSound('evolve');
            let ox = activePig.position.x; let oz = activePig.position.z; scene.remove(activePig);
            activePig = pigModels[idx]; activePig.position.set(ox, -2, oz); activePig.scale.set(pigScales[idx], pigScales[idx], pigScales[idx]); scene.add(activePig);
            currentLevel = idx+1; document.getElementById('eraBoard').innerText = name;
            createExplosion(ox, -1, oz, 0xE5C158); createExplosion(ox, 0, oz, 0xffffff);
            let ui = document.getElementById('levelUpText'); ui.style.opacity = 1; setTimeout(()=> ui.style.opacity=0, 2000);
        }

        const composer = new THREE.EffectComposer(renderer); composer.addPass(new THREE.RenderPass(scene, camera));
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.4, 0.8); composer.addPass(bloomPass);
        const fxaaPass = new THREE.ShaderPass(THREE.FXAAShader); const pixelRatio = renderer.getPixelRatio(); fxaaPass.material.uniforms['resolution'].value.x = 1 / (window.innerWidth * pixelRatio); fxaaPass.material.uniforms['resolution'].value.y = 1 / (window.innerHeight * pixelRatio); composer.addPass(fxaaPass);
        
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); 
            const pr = renderer.getPixelRatio(); fxaaPass.material.uniforms['resolution'].value.x = 1 / (window.innerWidth * pr); fxaaPass.material.uniforms['resolution'].value.y = 1 / (window.innerHeight * pr); 
            adjustCameraForMobile(); 
        });

        const controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enabled = false; controls.autoRotate = true; controls.autoRotateSpeed = 1.0; controls.maxDistance = 15; controls.minDistance = 4; controls.enableDamping = true;

        const eraData = [
            { title: "远古泥胚", desc: "红山文化的原始记忆，古朴的泥土线条，勾勒出文明最初的轮廓。" },
            { title: "数字金缮修复版", desc: "洗尽铅华，利用现代数字金缮工艺重现生机，展现陶器温润的质感。" },
            { title: "盛世重光华丽版", desc: "披上华丽的传统釉色与龙纹浮雕，象征中华文明在历史长河中的辉煌。" },
            { title: "赛博纪元高科版", desc: "机械与远古图腾的终极碰撞，跨越时空维度的数字艺术潮玩典藏。"}
        ];
        let galleryIdx = 0;

        function openGallery() {
            if(audioCtx.state === 'suspended') audioCtx.resume(); playBGM();
            document.getElementById('startScreen').style.display = 'none'; document.getElementById('gameOverScreen').style.display = 'none'; document.getElementById('galleryScreen').style.display = 'block';
            document.getElementById('boostArea').style.display = 'none'; document.getElementById('joystickZone').style.display = 'none';
            document.getElementById('legendBoard').style.display = 'none'; 
            
            gameState = 'gallery'; controls.enabled = true; camera.position.set(0, 2, 9); controls.target.set(0, -1, 0);
            activeItems.forEach(i => { i.mesh.visible = false; i.ring.visible = false; }); galleryIdx = currentLevel - 1; updateGallery();
        }

        function closeGallery() {
            document.getElementById('galleryScreen').style.display = 'none'; document.getElementById('startScreen').style.display = 'flex';
            gameState = 'start'; controls.enabled = false; adjustCameraForMobile();
            if(activePig) { activePig.position.set(0, -2, 0); activePig.rotation.set(0,0,0); }
            activeItems.forEach(i => { i.mesh.visible = true; i.ring.visible = true; });
        }

        function changeGallery(d) { galleryIdx = (galleryIdx + d + 4) % 4; updateGallery(); }

        function updateGallery() {
            if(activePig) scene.remove(activePig); if(!pigModels[galleryIdx]) return;
            activePig = pigModels[galleryIdx]; activePig.position.set(0, -2, 0); activePig.rotation.set(0,0,0); activePig.scale.set(pigScales[galleryIdx], pigScales[galleryIdx], pigScales[galleryIdx]); scene.add(activePig);
            document.getElementById('galleryTitle').innerText = eraData[galleryIdx].title; document.getElementById('galleryDesc').innerText = eraData[galleryIdx].desc; currentLevel = galleryIdx + 1;
        }

        // ==========================================
        // 【核心控制系统：摇杆与加速体系】
        // ==========================================
        let moveDir = { x: 0, z: 0 }; 
        let stamina = 100; 
        let isBoosting = false;
        const maxStamina = 100;
        let joystick = null;

        function initControls() {
            if(!joystick) {
                joystick = nipplejs.create({
                    zone: document.getElementById('joystickZone'),
                    mode: 'static',
                    position: { right: '50%', bottom: '50%' },
                    color: '#00E5FF'
                });
                joystick.on('move', (evt, data) => { if (data.vector) { moveDir.x = data.vector.x; moveDir.z = -data.vector.y; } });
                joystick.on('end', () => { moveDir = { x: 0, z: 0 }; });
            }
        }

        const btnBoost = document.getElementById('btnBoost');
        btnBoost.addEventListener('touchstart', (e) => { e.preventDefault(); if(stamina > 10) isBoosting = true; btnBoost.classList.add('active'); });
        btnBoost.addEventListener('touchend', () => { isBoosting = false; btnBoost.classList.remove('active'); });
        btnBoost.addEventListener('mousedown', (e) => { e.preventDefault(); if(stamina > 10) isBoosting = true; btnBoost.classList.add('active'); });
        btnBoost.addEventListener('mouseup', () => { isBoosting = false; btnBoost.classList.remove('active'); });
        btnBoost.addEventListener('mouseleave', () => { isBoosting = false; btnBoost.classList.remove('active'); });

        let keys = {}; 
        window.addEventListener('keydown', e => keys[e.code]=true); 
        window.addEventListener('keyup', e => keys[e.code]=false);

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume(); playBGM();
            document.getElementById('startScreen').style.display='none'; document.getElementById('uiLayer').style.display='block'; 
            resetGame();
        }

        function triggerGameOver() {
            gameState = 'gameover'; 
            document.getElementById('boostArea').style.display = 'none'; document.getElementById('joystickZone').style.display = 'none';
            document.getElementById('legendBoard').style.display = 'none'; 
            
            document.getElementById('finalScore').innerText = '探索得分：' + score; 
            finalRankName = calculateRank(score); document.getElementById('finalRankTitle').innerText = finalRankName;
            document.getElementById('gameOverScreen').style.display='flex';
            
            camera.position.set(0, 2, 8);
            controls.enabled = true; controls.autoRotate = true; controls.autoRotateSpeed = 2.0; controls.target.set(0, -1, 0);
        }

        function resetGame() {
            score = 0; stamina = 100; currentLevel = 1; lives = 3; moveDir = {x:0, z:0}; isBoosting = false;
            document.getElementById('scoreBoard').innerHTML='SCORE <span>0</span>'; document.getElementById('eraBoard').innerText='远古泥胚'; document.getElementById('livesBoard').innerText='❤️❤️❤️'; document.getElementById('gameOverScreen').style.display='none';
            activeItems.forEach(i => { scene.remove(i.mesh); scene.remove(i.ring); }); activeItems = [];
            controls.enabled = false; controls.autoRotate = false; adjustCameraForMobile(); 
            if(activePig) scene.remove(activePig);
            if(pigModels[0]) { activePig=pigModels[0]; activePig.position.set(0,-2,0); activePig.rotation.set(0,0,0); activePig.scale.set(pigScales[0], pigScales[0], pigScales[0]); scene.add(activePig); }
            gameState = 'playing';
            
            document.getElementById('legendBoard').style.display = 'flex'; 
            
            // 【修改：智能设备检测，仅在移动端屏幕或支持触摸时显示手机控件】
            if (window.innerWidth <= 768 || 'ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('boostArea').style.display = 'flex'; 
                document.getElementById('joystickZone').style.display = 'block';
                initControls(); 
            } else {
                document.getElementById('boostArea').style.display = 'none'; 
                document.getElementById('joystickZone').style.display = 'none';
            }
        }

        function generatePoster() {
            composer.render(); 
            const webglImgData = renderer.domElement.toDataURL('image/jpeg', 1.0);
            document.getElementById('posterModelImg').src = webglImgData;
            document.getElementById('posterScoreTxt').innerText = '最终探索得分：' + score;
            document.getElementById('posterRankTxt').innerText = finalRankName;
            
            const posterDOM = document.getElementById('posterContainer');
            posterDOM.style.left = '0';
            
            html2canvas(posterDOM, { scale: 2, backgroundColor: '#050505' }).then(canvas => {
                posterDOM.style.left = '-9999px';
                const finalImgData = canvas.toDataURL('image/jpeg', 0.9);
                document.getElementById('finalPosterImg').src = finalImgData;
                document.getElementById('posterOverlay').style.display = 'flex';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gameState==='gallery' || gameState === 'gameover') controls.update(); 

            for(let i=explosionParticles.length-1; i>=0; i--) {
                explosionParticles[i].position.add(explosionParticles[i].velocity); explosionParticles[i].life -= 0.02; explosionParticles[i].material.opacity = explosionParticles[i].life;
                if(explosionParticles[i].life <= 0) { scene.remove(explosionParticles[i]); explosionParticles.splice(i,1); }
            }
            for(let i=auraParticles.length-1; i>=0; i--) {
                auraParticles[i].position.add(auraParticles[i].velocity); auraParticles[i].life -= 0.015; auraParticles[i].material.opacity = auraParticles[i].life;
                if(auraParticles[i].life <= 0) { scene.remove(auraParticles[i]); auraParticles.splice(i,1); }
            }

            if((gameState === 'playing' || gameState === 'gallery' || gameState === 'gameover') && activePig) {
                pigLight.position.copy(activePig.position).add(new THREE.Vector3(0, 2, 2));
               // 赛博环绕力场特效
                const radius = 2.0; const ringSpeed = 0.005; 
                if (Math.random() < 0.3) {
                    const size = (currentLevel === 4) ? 0.08 : 0.04; 
                    const pColor = (currentLevel === 4) ? 0x00E5FF : 0xE5C158; 
                    const p = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshBasicMaterial({ color: pColor, transparent: true, opacity: 0.8 }));
                    const angle = Date.now() * ringSpeed + (Math.random() * Math.PI * 2); 
                    const px = activePig.position.x + Math.cos(angle) * radius;
                    const py = activePig.position.y + 0.5 + (Math.random() * 2); 
                    const pz = activePig.position.z + Math.sin(angle) * radius;
                    p.position.set(px, py, pz); p.velocity = new THREE.Vector3(0, 0.02, 0); p.life = 1.0; 
                    scene.add(p); auraParticles.push(p);
                }
            }

            if(gameState === 'playing' && activePig) {
                let currentSpawnChance = 0.008 + (currentLevel * 0.004); let currentMaxItems = 1 + currentLevel; let currentDropSpeed = 0.03 + (currentLevel * 0.005); 
                if (Math.random() < currentSpawnChance && activeItems.length < currentMaxItems) { spawnItem(currentDropSpeed); }
                activeItems.forEach(it => { it.mesh.rotation.y += 0.02; it.mesh.rotation.x += 0.01; });
                
                // ==========================================
                // 【核心执行：移动与体力计算】
                // ==========================================
                let targetX = moveDir.x; let targetZ = moveDir.z;
                // 兼容电脑端键盘操作
                if (keys['ArrowLeft'] || keys['KeyA']) targetX = -1;
                if (keys['ArrowRight'] || keys['KeyD']) targetX = 1;
                if (keys['ArrowUp'] || keys['KeyW']) targetZ = -1;
                if (keys['ArrowDown'] || keys['KeyS']) targetZ = 1;
                
                // 归一化对角线速度
                if (targetX !== 0 && targetZ !== 0 && moveDir.x === 0) {
                    let len = Math.sqrt(targetX*targetX + targetZ*targetZ); targetX /= len; targetZ /= len;
                }

                let isKeyboardBoosting = keys['ShiftLeft'] || keys['ShiftRight'];
                let currentlyBoosting = (isBoosting || isKeyboardBoosting) && stamina > 0;

                // 加速状态判断
                let currentSpeed = currentlyBoosting ? 0.35 : 0.15; 
                
                // 体力消耗与恢复逻辑
                if (currentlyBoosting) {
                    stamina -= 1.0; if (stamina < 0) stamina = 0;
                } else if (stamina < maxStamina) {
                    stamina += 0.3; // 自然恢复
                }
                document.getElementById('staminaBar').style.width = stamina + '%';

                // 物理位移
                if (targetX !== 0 || targetZ !== 0) {
                    activePig.position.x += targetX * currentSpeed;
                    activePig.position.z += targetZ * currentSpeed;
                    
                    // 丝滑转向逻辑（模型面向移动方向）
                    const targetRotation = Math.atan2(targetX, targetZ);
                    let diff = targetRotation - activePig.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    activePig.rotation.y += diff * 0.15;
                }

                // 边界限制
                activePig.position.x = Math.max(-15, Math.min(15, activePig.position.x));
                activePig.position.z = Math.max(-15, Math.min(15, activePig.position.z));

                for(let i=activeItems.length-1; i>=0; i--) {
                    let it = activeItems[i]; it.mesh.position.y -= it.speed; it.ring.position.x = it.mesh.position.x; it.ring.position.z = it.mesh.position.z;
                    let dX = Math.abs(activePig.position.x - it.mesh.position.x); let dY = Math.abs(activePig.position.y - it.mesh.position.y); let dZ = Math.abs(activePig.position.z - it.mesh.position.z);
                    if (dX < 1.8 && dY < 2.0 && dZ < 1.8) {
                        playSound(it.type); createExplosion(it.mesh.position.x, it.mesh.position.y, it.mesh.position.z, it.color);
                        if(it.type==='bomb') { lives--; } else { score += (it.type==='gold'?3:1); if(it.type==='heart' && lives < 5) lives++; }
                        document.getElementById('scoreBoard').innerHTML='SCORE <span>'+score+'</span>'; let h=''; for(let k=0; k<lives; k++) h+='❤️'; document.getElementById('livesBoard').innerText=h;
                        scene.remove(it.mesh); scene.remove(it.ring); activeItems.splice(i,1);
                        if(score>=10 && currentLevel===1) evolvePig(1, "数字金缮修复版"); if(score>=25 && currentLevel===2) evolvePig(2, "盛世重光华丽版"); if(score>=45 && currentLevel===3) evolvePig(3, "赛博纪元高科版");
                        if(lives<=0) { triggerGameOver(); }
                    } else if(it.mesh.position.y < -3.5) {
                        if(it.type==='apple' || it.type==='gold') { lives--; let h=''; for(let k=0; k<lives; k++) h+='❤️'; document.getElementById('livesBoard').innerText=h; }
                        scene.remove(it.mesh); scene.remove(it.ring); activeItems.splice(i,1);
                        if(lives<=0) { triggerGameOver(); }
                    }
                }
            }
            composer.render();
        }
        animate();
    </script>
</body>
</html>
